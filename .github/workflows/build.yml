name: Build AMBuild Plugin

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pisex/ubuntu20:latest

    env:
      HL2SDK_ROOT: "${{ github.workspace }}/external"
      MMS_PATH: "${{ github.workspace }}/external/metamod-source"
      MANIFEST_PATH: "${{ github.workspace }}/external/metamod-source/hl2sdk-manifests"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract plugin version
        id: pv
        run: |
          V=$(grep -oE 'GetVersion\(\) \{ return "[^"]+"' SkyboxChanger.cpp | grep -oE '"[^"]+"' | tr -d '"')
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"
          echo "Plugin version: $V"

      - name: Set up dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qy
          apt-get install -y git binutils python3 python3-pip zip

          python3 -m pip install --upgrade pip importlib-metadata
          python3 -m pip install setuptools==45.2.0

          git clone https://github.com/alliedmodders/ambuild.git ambuild
          cd ambuild
          pip3 install .
          cd ..

          mkdir -p external
          cd external
          git clone --recursive --branch master --single-branch https://github.com/alliedmodders/metamod-source.git
          git clone --recursive --branch cs2 --single-branch https://github.com/alliedmodders/hl2sdk.git hl2sdk-cs2

      - name: Configure and build plugin
        run: |
          python3 configure.py -s cs2 --targets x86_64 --enable-optimize --hl2sdk-manifests="${GITHUB_WORKSPACE}/hl2sdk-manifests" --mms_path="$MMS_PATH" --hl2sdk-root="$HL2SDK_ROOT"
          cd objdir
          ambuild

      - name: Package addon into ZIP
        run: |
          cd objdir/package/addons
          zip -r "${{ github.event.repository.name }}-${{ steps.pv.outputs.version }}.zip" .
          mv "${{ github.event.repository.name }}-${{ steps.pv.outputs.version }}.zip" "${GITHUB_WORKSPACE}/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ steps.pv.outputs.version }}
          path: ${{ github.workspace }}/${{ github.event.repository.name }}-${{ steps.pv.outputs.version }}.zip
